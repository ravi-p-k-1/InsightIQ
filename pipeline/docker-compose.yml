services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: insightiq-vector-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: insightiq
      POSTGRES_PASSWORD: insightiq
      POSTGRES_DB: insightiq_vector
    ports:
      - "15432:5432"
    volumes:
      - insightiq_vector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U insightiq -d insightiq_vector"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  insightiq_vector_data:
